name: Combined Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: actions
    permissions:
      contents: write
    steps:
      - name: Full Scope Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: HZZcode
          template: classic
          filename: github-metrics-combined.svg

          repositories_affiliations: owner, collaborator, organization_member
          
          base: header, repositories, metadata
          
          plugin_languages: yes
          plugin_languages_limit: 0
          plugin_languages_recent_load: 0
          plugin_languages_recent_days: 0
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 300
          plugin_languages_categories: programming
          plugin_languages_details: percentage, lines
          plugin_languages_ignored: html, css

          plugin_lines: yes

          # --- 进阶：如果你想包含私有仓库数据 ---
          # 注意：这需要你的 Token 拥有 'repo' 权限
          config_order: base.header, languages, lines, habits
